name: Update Gold Prices

on:
  schedule:
    - cron: '*/5 * * * *'   # 每5分钟
  push:
    branches: [main]
  workflow_dispatch:         # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch prices
        run: python3 update_data.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update gold prices [skip ci]"
          git push
